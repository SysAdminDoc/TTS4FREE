appId: com.bettertts.desktop
productName: BetterTTS
copyright: Copyright © 2026 SysAdminDoc

directories:
  output: release
  buildResources: build

# The renderer (dist/) and the compiled main/preload/tts-host (dist-electron/)
# ship alongside the production node_modules the native inference host resolves
# at runtime (kokoro-js → @huggingface/transformers → onnxruntime-node).
# main.cjs/preload.cjs stay esbuild-bundled; the host's model deps cannot be
# bundled because the ORT native addon loads from disk.
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

# Native addons must live outside the asar so the OS loader can dlopen them.
asarUnpack:
  - "**/*.node"

# Large model weights are fetched at runtime and cached natively, never bundled.
asar: true

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
