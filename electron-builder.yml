appId: com.bettertts.desktop
productName: BetterTTS
copyright: Copyright © 2026 SysAdminDoc

directories:
  output: release
  buildResources: build

# The renderer (dist/) and the compiled main/preload/tts-host (dist-electron/)
# ship alongside the production node_modules the native inference host resolves
# at runtime (kokoro-js → @huggingface/transformers → onnxruntime-node).
# main.cjs/preload.cjs stay esbuild-bundled; the host's model deps cannot be
# bundled because the ORT native addon loads from disk.
files:
  - dist/**/*
  - dist-electron/**/*
  - "!dist-electron/model-cache/**/*"
  - "!dist-electron/smoke.png"
  # Browser dependencies are already bundled into dist/ by Vite. The native
  # host only resolves kokoro-js, Transformers.js, phonemizer, and ORT Node.
  - "!node_modules/@breezystack/**/*"
  - "!node_modules/@mozilla/**/*"
  - "!node_modules/@piper-plus/**/*"
  - "!node_modules/ephone/**/*"
  - "!node_modules/fflate/**/*"
  - "!node_modules/kitten-tts-webgpu/**/*"
  - "!node_modules/lucide-react/**/*"
  - "!node_modules/onnxruntime-web/**/*"
  - "!node_modules/pdfjs-dist/**/*"
  - "!node_modules/piper-plus/**/*"
  - "!node_modules/react/**/*"
  - "!node_modules/react-dom/**/*"
  - "!node_modules/signalsmith-stretch/**/*"
  - "!node_modules/@huggingface/transformers/node_modules/onnxruntime-web/**/*"
  # The installer target is Windows x64; retain only that native ORT payload.
  - "!node_modules/onnxruntime-node/bin/napi-v6/darwin/**/*"
  - "!node_modules/onnxruntime-node/bin/napi-v6/linux/**/*"
  - "!node_modules/onnxruntime-node/bin/napi-v6/win32/arm64/**/*"
  - "!node_modules/@huggingface/transformers/node_modules/onnxruntime-node/bin/napi-v6/darwin/**/*"
  - "!node_modules/@huggingface/transformers/node_modules/onnxruntime-node/bin/napi-v6/linux/**/*"
  - "!node_modules/@huggingface/transformers/node_modules/onnxruntime-node/bin/napi-v6/win32/arm64/**/*"
  - package.json

# Native addons must live outside the asar so the OS loader can dlopen them.
asarUnpack:
  - "**/*.node"

# Large model weights are fetched at runtime and cached natively, never bundled.
asar: true

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
